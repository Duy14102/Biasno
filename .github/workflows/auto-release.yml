name: auto-release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        shell: bash
        run: |
          set -euo pipefail

          latest=$(git tag -l 'v*' | sort -V | tail -n1)
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          A="${ver%%.*}"; rest="${ver#*.}"; B="${rest%%.*}"; C="${rest##*.}"

          # Precedence: release > feature > bug. (feature + bug => feature)
          bump=""
          case " $LABELS " in
            *" release "*)                  bump="major" ;;
            *" feature "*|*" enhancement "*) bump="feature" ;;
            *" bug "*)                       bump="bug" ;;
          esac

          if [ -z "$bump" ]; then
            echo "No release-type label (bug / feature / release) on this PR — skipping release."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$bump" in
            major)   A=$((A+1)); B=0; C=0 ;;   # official release; leaves beta (A>=1)
            feature) B=$((B+1)); C=0 ;;
            bug)     C=$((C+1)) ;;
          esac

          new_tag="v$A.$B.$C"
          echo "bump=$bump"        >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag"  >> "$GITHUB_OUTPUT"
          echo "::notice::$latest -> $new_tag ($bump) from labels: ${LABELS:-none}"

  release:
    needs: version
    if: needs.version.outputs.bump != 'none'
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
