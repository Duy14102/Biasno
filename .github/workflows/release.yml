name: release

on:
  push:
    tags: ['v*']
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release (e.g. v0.1.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags so we can diff against the previous tag

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Pre-release iff the tag carries a semver pre-release suffix (e.g.
          # v0.2.0-beta.1).  Plain vX.Y.Z tags are normal releases, so the
          # newest always gets GitHub's "Latest" badge.
          case "$TAG" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - run: npm ci

      - name: Sync package.json version
        shell: bash
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build Electron app
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Rename win-unpacked to versioned folder
        shell: pwsh
        run: Rename-Item -Path release/win-unpacked -NewName Biasno-${{ steps.ver.outputs.tag }}

      - name: Zip versioned folder
        shell: pwsh
        run: Compress-Archive -Path release/Biasno-${{ steps.ver.outputs.tag }} -DestinationPath release/Biasno-${{ steps.ver.outputs.tag }}.zip

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail

          # Previous tag = highest existing v* that isn't the one we're cutting.
          PREV=$(git tag -l 'v*' | grep -vxF "$TARGET" | sort -V | tail -n1 || true)

          # Collect commit subjects between the previous tag and the default
          # branch via GitHub's compare API — robust regardless of which ref the
          # workflow checked out (pull_request events check out a merge ref).
          # The API call is retried: a single transient/empty response used to
          # get swallowed by `2>/dev/null || true`, silently blanking the notes.
          # First line of each commit message only — enough for the "(#N)" /
          # "Merge pull request #N" detection below, and lets the no-PR
          # fallback group raw subjects by conventional-commit prefix.
          fetch_subjects() {
            if [ -n "$PREV" ]; then
              gh api "repos/$REPO/compare/$PREV...main" --jq '.commits[].commit.message | split("\n")[0]'
            else
              gh api "repos/$REPO/commits?sha=main&per_page=100" --jq '.[].commit.message | split("\n")[0]'
            fi
          }
          subjects=""
          for attempt in 1 2 3; do
            if subjects=$(fetch_subjects 2>/tmp/api_err); then
              if [ -n "$subjects" ]; then break; fi
            fi
            echo "::warning::release-notes: commit fetch attempt $attempt empty — $(tr '\n' ' ' < /tmp/api_err)"
            sleep 5
          done

          # PR numbers referenced by squash-merge "(#N)" or merge-commit subjects.
          nums=$(printf '%s' "$subjects" \
            | grep -oE '\(#[0-9]+\)|Merge pull request #[0-9]+' \
            | grep -oE '[0-9]+' | sort -un || true)

          # Strip a leading conventional-commit prefix (feat:, fix(scope)!:, …).
          strip() { printf '%s' "$1" | sed -E 's/^[a-z]+(\([^)]*\))?!?:[[:space:]]*//'; }

          # Right after a squash merge, `gh pr view N` for the just-merged PR
          # can briefly return nothing.  The compare fetch above is retried but
          # this call was not — so a single-PR release (e.g. v0.1.2, whose only
          # PR was the notes fix itself) still blanked out.  Retry here too.
          pr_view() {
            local n="$1" out=""
            for attempt in 1 2 3; do
              out=$(gh pr view "$n" --repo "$REPO" --json title,labels 2>/dev/null || true)
              if [ -n "$out" ]; then printf '%s' "$out"; return 0; fi
              echo "::warning::release-notes: gh pr view #$n empty — attempt $attempt" >&2
              sleep 5
            done
            return 0
          }

          feats=""; fixes=""; others=""
          for n in $nums; do
            json=$(pr_view "$n")
            [ -z "$json" ] && continue
            title=$(printf '%s' "$json" | jq -r '.title')
            labels=$(printf '%s' "$json" | jq -r '[.labels[].name] | join(" ")')
            line="- $(strip "$title") (#${n})"$'\n'
            case " $labels " in
              *" feature "*|*" enhancement "*) feats="${feats}${line}" ;;
              *" bug "*)                       fixes="${fixes}${line}" ;;
              *)                               others="${others}${line}" ;;
            esac
          done

          # Fallback for merge methods that leave no PR reference in the
          # subjects (e.g. "Rebase and merge").  Group the raw commit subjects
          # by their conventional-commit prefix so the notes are never blank
          # when there are real commits.  Skips merge/chore/skip-ci noise.
          if [ -z "$feats$fixes$others" ]; then
            while IFS= read -r subj; do
              [ -z "$subj" ] && continue
              case "$subj" in
                Merge\ *|chore:*|chore\(*|*"[skip ci]"*) continue ;;
              esac
              line="- $(strip "$subj")"$'\n'
              case "$subj" in
                feat:*|feat\(*) feats="${feats}${line}" ;;
                fix:*|fix\(*)   fixes="${fixes}${line}" ;;
                *)              others="${others}${line}" ;;
              esac
            done <<< "$subjects"
          fi

          {
            echo "## 🎹 Biasno ${TARGET}"
            echo
            [ -n "$feats" ]  && { echo "### 🚀 Features";    echo; printf '%s' "$feats";  echo; }
            [ -n "$fixes" ]  && { echo "### 🐛 Fixes";       echo; printf '%s' "$fixes";  echo; }
            [ -n "$others" ] && { echo "### 🔧 Other";       echo; printf '%s' "$others"; echo; }
            echo "### 📦 Install"
            echo
            echo "Download **\`Biasno-${TARGET}.zip\`** below, extract it, and run \`Biasno-${TARGET}/Biasno.exe\` — Windows portable, no installer."
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/${REPO}/compare/${PREV}...${TARGET}"
            fi
          } > release_notes.md

          # Surface a silent-blank notes body in the run summary instead of
          # shipping an empty release like v0.1.1 did.
          if [ -z "$feats$fixes$others" ]; then
            echo "::warning::release-notes: no PRs grouped into the body (subjects empty or unlabelled) — release notes will only show Install/changelog."
          fi

          echo "---- release notes ----"; cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: release/Biasno-${{ steps.ver.outputs.tag }}.zip
          body_path: release_notes.md
          prerelease: ${{ steps.ver.outputs.prerelease }}
