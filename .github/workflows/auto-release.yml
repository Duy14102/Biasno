name: auto-release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        shell: bash
        run: |
          set -euo pipefail

          # Base the bump off the latest STABLE tag (ignore -beta/-* pre-releases),
          # so a string of betas doesn't keep re-bumping the base version.
          latest=$(git tag -l 'v*' | grep -v -- '-' | sort -V | tail -n1 || true)
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          A="${ver%%.*}"; rest="${ver#*.}"; B="${rest%%.*}"; C="${rest##*.}"

          # Precedence: release > feature > bug > chore. (feature + bug => feature)
          bump=""
          case " $LABELS " in
            *" release "*)                  bump="major" ;;
            *" feature "*|*" enhancement "*) bump="feature" ;;
            *" bug "*)                       bump="bug" ;;
            *" chore "*)                     bump="chore" ;;
          esac

          if [ -z "$bump" ]; then
            echo "No release-type label (bug / feature / release / chore) on this PR — skipping release."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$bump" in
            major)   A=$((A+1)); B=0; C=0 ;;   # official release; leaves beta (A>=1)
            feature) B=$((B+1)); C=0 ;;
            bug)     C=$((C+1)) ;;
            chore)   C=$((C+1)) ;;
          esac
          base="v$A.$B.$C"

          # A "beta" label cuts a pre-release: vX.Y.Z-beta.N, N auto-incrementing
          # per base version.  Without it, a plain vX.Y.Z normal release is cut
          # (so the newest gets GitHub's "Latest" badge).
          case " $LABELS " in
            *" beta "*)
              n=$(git tag -l "${base}-beta.*" | sed -E 's/.*-beta\.//' | sort -n | tail -n1)
              n=$(( ${n:-0} + 1 ))
              new_tag="${base}-beta.${n}" ;;
            *)
              new_tag="$base" ;;
          esac

          echo "bump=$bump"        >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag"  >> "$GITHUB_OUTPUT"
          echo "::notice::$latest -> $new_tag ($bump) from labels: ${LABELS:-none}"

      # Keep package.json in step with the released tag.  The build syncs the
      # version at build time too, but committing it back here stops the repo
      # (and local/dev builds) drifting forever at the placeholder version.
      # Best-effort: a protected-branch push failure must NOT block the release.
      - name: Commit version bump to main
        if: steps.bump.outputs.bump != 'none'
        continue-on-error: true
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${NEW_TAG#v}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull --ff-only origin main
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          if git diff --quiet; then
            echo "package.json already at $VERSION"
          else
            # [skip ci] so this housekeeping push doesn't re-run checks.
            git commit -am "chore: bump version to ${NEW_TAG} [skip ci]"
            git push origin main
          fi

  release:
    needs: version
    if: needs.version.outputs.bump != 'none'
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.version.outputs.new_tag }}
